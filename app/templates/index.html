<!DOCTYPE html>
<html>
<head>
    <title>Phishing Detector</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
        h1 { font-size: 24px; }
        input { width: 100%; padding: 10px; font-size: 14px; margin: 10px 0; box-sizing: border-box; }
        button { padding: 10px 24px; font-size: 14px; cursor: pointer; }
        #result { margin-top: 20px; padding: 16px; border-radius: 6px; display: none; }
        .phishing { background: #fdecea; border: 1px solid #f5c6cb; color: #a00; }
        .legitimate { background: #e9f7ef; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #fff3cd; border: 1px solid #ffc107; color: #856404; }
    </style>
</head>
<body>
    <h1>Phishing URL Detector</h1>
    <p>Enter a URL to check if it is phishing or legitimate.</p>
    <input type="text" id="url-input" placeholder="e.g. http://secure-paypal-login.xyz" />
    <button onclick="check()">Check URL</button>
    <div id="result"></div>

    <script>
        async function check() {
            const url = document.getElementById('url-input').value.trim();
            if (!url) return alert('Please enter a URL');

            const res = await fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url })
            });

            const data = await res.json();
            const box = document.getElementById('result');
            box.style.display = 'block';

            if (data.error) {
                box.className = 'error';
                box.innerHTML = `⚠️ ${data.error}`;
            } else {
                box.className = data.label;
                const isPhishing = data.label === 'phishing';
                const icon  = isPhishing ? '⚠️' : '✅';
                const title = isPhishing ? 'Phishing Detected' : 'Legitimate';

                let detailHtml = '';
                if (isPhishing && data.reasons && data.reasons.length) {
                    // Show suspicious signals only for phishing verdicts
                    detailHtml = `
                        <p style="margin: 8px 0 4px 0; font-size: 13px; font-weight: bold;">Suspicious signals detected:</p>
                        <ul style="margin: 0; padding-left: 18px; font-size: 13px;">
                            ${data.reasons.map(r => `<li>${r}</li>`).join('')}
                        </ul>`;
                } else if (!isPhishing) {
                    // Clean positive message for legitimate URLs
                    detailHtml = `<p style="margin: 8px 0 0 0; font-size: 13px;">No suspicious signals detected in this URL.</p>`;
                }

                box.innerHTML = `${icon} <strong>${title}</strong> — Confidence: ${data.confidence}%${detailHtml}`;
            }
        }
    </script>
</body>
</html>
